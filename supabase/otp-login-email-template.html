<h2>Harman giriş kodunuz</h2>

<p>Harman hesabınıza giriş yapmak için aşağıdaki tek kullanımlık kodu kullanın:</p>

<div style="font-size: 32px; font-weight: 800; letter-spacing: 8px; padding: 16px; background: #f1e4cd; border-radius: 10px; text-align: center;">
  {{ .Token }}
</div>

<p>Bu kod kısa süre içinde geçersiz olur. Bu isteği siz yapmadıysanız bu e-postayı yok sayabilirsiniz.</p>

<p style="font-size: 12px; color: #57534e;">
  Harman, resmi tarımsal tavsiye veya garanti vermez.
</p>
